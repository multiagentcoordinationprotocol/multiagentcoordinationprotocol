version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/multiagentcoordinationprotocol/macp-proto-go
plugins:
  - remote: buf.build/protocolbuffers/go
    out: packages/proto-go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: packages/proto-go
    opt:
      - paths=source_relative
