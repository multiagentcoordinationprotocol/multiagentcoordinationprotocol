name: Publish Proto Packages

on:
  push:
    tags:
      - 'proto-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — build and verify only, skip publishing'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dry_run: ${{ steps.version.outputs.dry_run }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            DRY_RUN="${{ inputs.dry_run }}"
          else
            VERSION="${GITHUB_REF#refs/tags/proto-v}"
            DRY_RUN="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (dry_run: $DRY_RUN)"

  # ── npm (@macp/proto) ───────────────────────────────────────────────
  publish-npm:
    name: Publish npm Package (@macp/proto)
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@macp'

      - name: Prepare package
        run: |
          cd packages/proto-npm
          rm -rf proto/macp
          cp -r ../../schemas/proto/macp proto/macp
          VERSION="${{ needs.extract-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Verify package
        run: cd packages/proto-npm && npm pack --dry-run

      - name: Publish to GitHub Packages
        if: needs.extract-version.outputs.dry_run != 'true'
        run: cd packages/proto-npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── PyPI (macp-proto) ───────────────────────────────────────────────
  publish-pypi:
    name: Publish PyPI Package (macp-proto)
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine grpcio-tools

      - name: Generate Python protobuf code
        run: |
          cd packages/proto-python
          python -m grpc_tools.protoc \
            -I../../schemas/proto \
            --python_out=src \
            --grpc_python_out=src \
            macp/v1/envelope.proto macp/v1/core.proto macp/v1/policy.proto \
            macp/modes/decision/v1/decision.proto macp/modes/proposal/v1/proposal.proto \
            macp/modes/task/v1/task.proto macp/modes/handoff/v1/handoff.proto \
            macp/modes/quorum/v1/quorum.proto

      - name: Update version and build
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          cd packages/proto-python
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          python -m build

      - name: Publish to PyPI
        if: needs.extract-version.outputs.dry_run != 'true'
        run: cd packages/proto-python && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Rust crate (macp-proto) ─────────────────────────────────────────
  publish-rust:
    name: Publish Rust Crate (macp-proto)
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare crate
        run: |
          cd packages/proto-rust
          rm -rf proto/macp
          cp -r ../../schemas/proto/macp proto/macp
          VERSION="${{ needs.extract-version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml

      - name: Verify crate builds
        run: cd packages/proto-rust && cargo check

      - name: Publish to crates.io
        if: needs.extract-version.outputs.dry_run != 'true'
        run: cd packages/proto-rust && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Go module ───────────────────────────────────────────────────────
  publish-go:
    name: Publish Go Module
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Generate Go code
        run: buf generate --template buf/buf.gen.go.yaml

      - name: Update go.mod and verify
        run: |
          cd packages/proto-go
          go mod tidy
          go build ./...

      - name: Tag Go module
        if: needs.extract-version.outputs.dry_run != 'true'
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/proto-go/
          git commit -m "chore: update Go proto package to v${VERSION}" || true
          git tag "packages/proto-go/v${VERSION}"
          git push origin "packages/proto-go/v${VERSION}"

  # ── Java (Maven / GitHub Packages) ──────────────────────────────────
  publish-java:
    name: Publish Java Package (io.macp:macp-proto)
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Java code
        run: buf generate --template buf/buf.gen.java.yaml

      - name: Build and verify
        run: |
          cd packages/proto-java
          VERSION="${{ needs.extract-version.outputs.version }}"
          sed -i "s/version = .*/version = \"${VERSION}\"/" build.gradle.kts
          gradle compileJava

      - name: Publish to GitHub Packages
        if: needs.extract-version.outputs.dry_run != 'true'
        run: cd packages/proto-java && gradle publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Kotlin (Maven / GitHub Packages) ────────────────────────────────
  publish-kotlin:
    name: Publish Kotlin Package (io.macp:macp-proto-kotlin)
    runs-on: ubuntu-latest
    needs: [extract-version, publish-java]
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Kotlin code
        run: buf generate --template buf/buf.gen.kotlin.yaml

      - name: Install Java dependency to mavenLocal (dry run)
        if: needs.extract-version.outputs.dry_run == 'true'
        run: |
          buf generate --template buf/buf.gen.java.yaml
          cd packages/proto-java
          VERSION="${{ needs.extract-version.outputs.version }}"
          sed -i "s/version = .*/version = \"${VERSION}\"/" build.gradle.kts
          gradle publishToMavenLocal

      - name: Build and verify
        run: |
          cd packages/proto-kotlin
          VERSION="${{ needs.extract-version.outputs.version }}"
          sed -i "s/version = .*/version = \"${VERSION}\"/" build.gradle.kts
          sed -i "s/io.macp:macp-proto:[0-9.]*\"/io.macp:macp-proto:${VERSION}\"/" build.gradle.kts
          gradle compileKotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: needs.extract-version.outputs.dry_run != 'true'
        run: cd packages/proto-kotlin && gradle publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── C# (NuGet / GitHub Packages) ────────────────────────────────────
  publish-csharp:
    name: Publish C# Package (Macp.Proto)
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate C# code
        run: buf generate --template buf/buf.gen.csharp.yaml

      - name: Build and verify
        run: |
          cd packages/proto-csharp
          VERSION="${{ needs.extract-version.outputs.version }}"
          dotnet pack -c Release -p:Version="$VERSION" -o nupkg/

      - name: Publish to GitHub Packages
        if: needs.extract-version.outputs.dry_run != 'true'
        run: |
          cd packages/proto-csharp
          dotnet nuget push nupkg/*.nupkg \
            --source "https://nuget.pkg.github.com/multiagentcoordinationprotocol/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}"

