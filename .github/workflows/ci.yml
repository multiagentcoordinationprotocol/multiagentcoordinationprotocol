name: MACP CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Validate Schemas and Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli for JSON Schema validation
        run: npm install -g ajv-cli

      - name: Validate JSON Schema itself (meta-validation)
        run: |
          echo "Validating JSON Schema..."
          chmod +x scripts/validate-json-schema.sh
          ./scripts/validate-json-schema.sh

      - name: Validate JSON examples against schema
        run: |
          echo "Validating JSON examples..."
          chmod +x scripts/validate-json.sh
          ./scripts/validate-json.sh

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Validate Protobuf compiles
        run: |
          echo "Validating protobuf compilation..."
          chmod +x scripts/validate-proto.sh
          ./scripts/validate-proto.sh

  lint-protobuf:
    name: Lint Protocol Buffers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint protobuf with buf
        run: buf lint

      - name: Check for breaking changes
        if: github.event_name == 'pull_request'
        run: |
          # Only check breaking changes on pull requests
          # Compare against main branch
          git fetch origin main
          buf breaking --against '.git#branch=origin/main'

      - name: Push to BSR
        if: github.ref == 'refs/heads/main'
        uses: bufbuild/buf-push-action@v1
        with:
          input: schemas/proto
          buf_token: ${{ secrets.BUF_TOKEN }}

  generate-code:
    name: Generate and Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate Go and verify
        run: |
          buf generate --template buf/buf.gen.go.yaml
          cd packages/proto-go
          go build ./...

      - name: Generate Java
        run: buf generate --template buf/buf.gen.java.yaml

      - name: Generate Kotlin
        run: buf generate --template buf/buf.gen.kotlin.yaml

      - name: Generate C#
        run: buf generate --template buf/buf.gen.csharp.yaml

      - name: Generate JS
        run: buf generate --template buf/buf.gen.js.yaml

  validate-all:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: [validate, lint-protobuf, generate-code]

    steps:
      - name: Summary
        run: |
          echo "✓ All validations passed successfully"
          echo "  - JSON Schema validated"
          echo "  - JSON examples validated"
          echo "  - Protobuf schemas validated"
          echo "  - Protobuf linting passed"
          echo "  - Per-language code generation successful"
