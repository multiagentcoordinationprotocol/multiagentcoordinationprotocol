name: MACP CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Validate Schemas and Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli for JSON Schema validation
        run: npm install -g ajv-cli

      - name: Validate JSON Schema itself (meta-validation)
        run: |
          echo "Validating JSON Schema..."
          chmod +x scripts/validate-json-schema.sh
          ./scripts/validate-json-schema.sh

      - name: Validate JSON examples against schema
        run: |
          echo "Validating JSON examples..."
          chmod +x scripts/validate-json.sh
          ./scripts/validate-json.sh

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Validate Protobuf compiles
        run: |
          echo "Validating protobuf compilation..."
          chmod +x scripts/validate-proto.sh
          ./scripts/validate-proto.sh

      - name: Check proto package sync
        run: |
          echo "Checking raw-proto packages match canonical..."
          chmod +x scripts/sync-proto-packages.sh
          ./scripts/sync-proto-packages.sh --check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install grpcio-tools for stub drift check
        run: pip install grpcio-tools

      - name: Check Python _pb2_grpc.py stubs for drift
        run: |
          echo "Checking committed Python gRPC stubs match canonical protos..."
          chmod +x scripts/check-python-stubs.sh
          ./scripts/check-python-stubs.sh

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Go protobuf stubs for drift
        run: |
          echo "Checking committed Go protobuf stubs match canonical protos..."
          chmod +x scripts/check-go-stubs.sh
          ./scripts/check-go-stubs.sh

      - name: Check SDK proto parity (W3a / direct-agent-auth)
        run: |
          echo "Checking typescript-sdk + python-sdk proto ranges match the canonical packages..."
          chmod +x scripts/check-proto-parity.sh
          # The parity script requires the SDK sibling repos to be present on disk.
          # In CI this is only meaningful on a checkout that includes them — skip cleanly otherwise.
          if [ -d ../typescript-sdk ] && [ -d ../python-sdk ]; then
            ./scripts/check-proto-parity.sh
          else
            echo "SKIP: ../typescript-sdk or ../python-sdk not present in this checkout."
            echo "This check runs in the monorepo-wide CI that checks out all sibling repos."
          fi

  lint-protobuf:
    name: Lint Protocol Buffers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint protobuf with buf
        run: buf lint

      - name: Check for breaking changes
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          # Informational during pre-1.0 development; breaking changes are expected.
          # Compare against main branch
          git fetch origin main
          buf breaking --against '.git#branch=origin/main'

      - name: Push to BSR
        if: github.ref == 'refs/heads/main'
        uses: bufbuild/buf-push-action@v1
        with:
          input: schemas/proto
          buf_token: ${{ secrets.BUF_TOKEN }}

  generate-code:
    name: Generate and Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Generate Go and verify
        run: |
          buf generate --template buf/buf.gen.go.yaml
          cd packages/proto-go
          go mod tidy
          go build ./...

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Java and verify
        run: |
          buf generate --template buf/buf.gen.java.yaml
          cd packages/proto-java
          gradle compileJava

      - name: Publish Java to mavenLocal for Kotlin dependency
        run: |
          cd packages/proto-java
          gradle publishToMavenLocal

      - name: Generate Kotlin and verify
        run: |
          buf generate --template buf/buf.gen.kotlin.yaml
          cd packages/proto-kotlin
          gradle compileKotlin

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate C# and verify
        run: |
          buf generate --template buf/buf.gen.csharp.yaml
          cd packages/proto-csharp
          dotnet build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate Python and verify
        run: |
          pip install grpcio-tools
          python -m grpc_tools.protoc \
            -Ischemas/proto \
            --python_out=packages/proto-python/src \
            --grpc_python_out=packages/proto-python/src \
            macp/v1/envelope.proto macp/v1/core.proto macp/v1/policy.proto \
            macp/modes/decision/v1/decision.proto macp/modes/proposal/v1/proposal.proto \
            macp/modes/task/v1/task.proto macp/modes/handoff/v1/handoff.proto \
            macp/modes/quorum/v1/quorum.proto
          python -c "import importlib, sys; sys.path.insert(0, 'packages/proto-python/src'); importlib.import_module('macp.v1.envelope_pb2'); print('Python imports OK')"

      - name: Generate JS and verify
        run: |
          buf generate --template buf/buf.gen.js.yaml
          test -d packages/proto-npm/generated && \
            find packages/proto-npm/generated -name '*.js' | head -1 | grep -q . && \
            echo "JS generation OK" || \
            (echo "ERROR: No JS files generated" && exit 1)

  validate-all:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: [validate, lint-protobuf, generate-code]

    steps:
      - name: Summary
        run: |
          echo "✓ All validations passed successfully"
          echo "  - JSON Schema validated"
          echo "  - JSON examples validated"
          echo "  - Protobuf schemas validated"
          echo "  - Protobuf linting passed"
          echo "  - Per-language code generation successful"
